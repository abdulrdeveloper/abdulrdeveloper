name: Generate 3D Profile Contribution Graph

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Commit and push updated 3D assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -d profile-3d-contrib ]; then
            echo "::error::profile-3d-contrib directory was not generated."
            exit 1
          fi
          git add profile-3d-contrib
          if git diff --staged --quiet; then
            echo "::notice::No 3D contribution updates to commit."
            exit 0
          fi
          git commit -m "chore: update 3d profile contribution graph"
          git push
